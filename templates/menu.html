<!-- Header -->
<header class="header" id="main-header">
    <div class="container-fluid">
        <div class="header-top d-flex align-items-center justify-content-between py-3 flex-wrap gap-2">
            <div class="logo-dropdown d-flex">
                    <a href="/" class="logo-text logo">SCANLY</a>
                <button class="logo d-flex align-items-center" type="button" id="logoDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <div class="logo-icon ms-2"></div>
                </button>
                <ul class="dropdown-menu categories-dropdown" aria-labelledby="logoDropdown">
                    <strong>Популярные категории</strong>
                    {% if categories %}
                        {% for category in categories %}
                            <li><a class="dropdown-item category-item" href="{% url 'category_page' category.alias %}">{{category.name}}</a></li>
                        {% endfor %}
                    {% endif %}
                </ul>
            </div>
            
            <div class="search-wrapper flex-grow-1 mx-3 mx-md-0">
                <form action="{% url 'search_page' %}" method="GET">
                    <div class="search-input-wrapper">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" name="q" class="form-control search-input" placeholder="Find me someone who...">
                    </div>
                </form>
            </div>
            
            <div class="header-actions d-flex align-items-center gap-2 gap-md-3">
                <div class="lang-selector d-flex align-items-center">
                    <span class="active">RU</span> / <span>ENG</span>
                </div>
                <button class="btn btn-profile">
                    <span class="d-none d-md-inline">Профиль</span>
                </button>
            </div>
        </div>
                    <h1 class="hero-title">
                        <span class="hero-title-dark">STOP SEARCHING</span>
                        <span class="hero-title-accent">START MATCHING</span>
                    </h1>
        
        <nav class="nav-tabs-wrapper">
            <ul class="nav nav-tabs nav-tabs-custom" role="tablist">
                <li class="nav-item">
                    <a class="nav-link {% if page_type == 'trending' %}active {% endif %}" href="{% url 'trending_accounts' %}"><i class="bi bi-list-ul me-1"></i>Сейчас в тренде</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page_type == 'best' %}active {% endif %}" href="{% url 'best_accounts' %}"><i class="bi bi-star me-1"></i>Лучшие аккаунты</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if page_type == 'free' %}active {% endif %}" href="{% url 'free_accounts' %}"><i class="bi bi-trophy me-1"></i>Top Free</a>
                </li>
              <!--  <li class="nav-item">
                    <a class="nav-link" href="#"><i class="bi bi-geo-alt me-1"></i>Рядом со мной</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#"><i class="bi bi-camera me-1"></i>Поиск по фото</a>
                </li> -->
                <li class="nav-item">
                    <a class="nav-link {% if page_type == 'new' %}active {% endif %}" href="{% url 'new_accounts' %}"><i class="bi bi-person-plus me-1"></i>Новые аккаунты</a>
                </li>
            </ul>
        </nav>
    </div>
</header>
